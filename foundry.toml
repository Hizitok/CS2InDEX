[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Compiler settings
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Test settings
verbosity = 2
fuzz_runs = 256
fuzz_max_test_rejects = 65536

# Gas reports
gas_reports = ["*"]

# Formatting
line_length = 100
tab_width = 4
bracket_spacing = true

# RPC endpoints (add your own)
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

# Etherscan API keys
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# CI profile
[profile.ci]
fuzz_runs = 5000
verbosity = 4

# Local profile for development
[profile.local]
verbosity = 3
fuzz_runs = 100
