[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Compiler settings
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Test settings
verbosity = 2

# Gas reports
gas_reports = ["*"]

# Filesystem permissions (required for vm.writeFile in deploy scripts)
fs_permissions = [{ access = "read-write", path = "deploy/" }]

# RPC endpoints (add your own)
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

# Etherscan API keys
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# CI profile
[profile.ci]
verbosity = 4

[profile.ci.fuzz]
runs = 5000

# Local profile for development
[profile.local]
verbosity = 3

[profile.local.fuzz]
runs = 100
